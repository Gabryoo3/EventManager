{% extends 'base.html' %}
{% block title %}Conferma cambio password {% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
    <div class='row'>
        <main class="col-12">
            <div class="card shadow-sm border-0 p-5 text-center">
                <div class="card-body">

                    <h3 class="fw-bold text-dark mb-2">Password modificata!</h3>
                    <p class="text-muted mx-auto mb-4" style="max-width: 450px;">
                        La tua password è stata aggiornata con successo!
                    </p>
                    <div>
                        <a href="{% url 'account:profile' %}" class="btn btn-success px-4 fw-bold shadow-sm">
                            Torna al Profilo
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
{% endblock %}
