{% extends 'base.html' %}
{% block title %}Accedi{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
    <div class="row justify-content-center my-5 align-content-center">
        <div class="col-md-5">
            <div class="shadow border-0 p-4">
                <h2 class="fw-bold mb-3 text-center">Accedi</h2>
                <form method="POST">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success w-100 mt-3">Log In</button>
                </form>
            </div>
            <a href="{% url 'account:register' %}"><h5>Vuoi registrarti invece?</h5></a>
        </div>
    </div>
{% endblock %}
